name: "Publication quotidienne - Bonnes Nouvelles"

on:
  # schedule:
  #   # 8h00 heure de Paris = 7h00 UTC (hiver CET) / 6h00 UTC (été CEST)
  #   # On utilise 7h UTC pour couvrir l'heure d'hiver (8h Paris)
  #   # En été, ça se déclenchera à 9h Paris, ce qui reste acceptable
  #   - cron: "0 7 * * 1-5"
  workflow_dispatch:
    inputs:
      force_date:
        description: "Forcer une date specifique (YYYY-MM-DD)"
        required: false
        type: string

permissions:
  contents: write

env:
  TZ: Europe/Paris

jobs:
  generate-article:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: "Checkout du repository"
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: "Installation de Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Installation des dependances"
        run: pip install -r scripts/requirements.txt

      - name: "Generation de l'article du jour"
        id: generate
        env:
          MAMMOUTH_API_KEY: ${{ secrets.MAMMOUTH_API_KEY }}
          FORCE_DATE: ${{ inputs.force_date }}
        run: python scripts/generate-article.py

      - name: "Commit et push"
        run: |
          git config user.name "Bonnes Nouvelles Bot"
          git config user.email "bot@bonnes-nouvelles.fr"
          git add content/posts/

          if git diff --staged --quiet; then
            echo "Aucun nouvel article a publier."
            exit 0
          fi

          ARTICLE_DATE="${{ steps.generate.outputs.article_date }}"
          ARTICLE_DAY="${{ steps.generate.outputs.article_day }}"
          ARTICLE_THEME="${{ steps.generate.outputs.article_theme }}"

          if [ -z "$ARTICLE_DATE" ]; then
            ARTICLE_DATE=$(date +%Y-%m-%d)
            ARTICLE_DAY=$(date +%A)
            ARTICLE_THEME="actualite"
          fi

          git commit -m "Article du ${ARTICLE_DAY} ${ARTICLE_DATE} - ${ARTICLE_THEME}"
          git push
