<header class="site-header">
  <div class="container">
    <a href="/" class="logo">
      <span class="logo-icon">☀️</span>
      <span class="logo-text">Bonnes Nouvelles</span>
    </a>
    <nav class="main-nav">
      <button class="nav-toggle" aria-label="Menu" onclick="this.parentElement.classList.toggle('open')">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}" class="{{ if $.IsMenuCurrent "main" . }}active{{ end }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
