baseURL = "/"
languageCode = "fr"
title = "Bonnes Nouvelles"
summaryLength = 40

[pagination]
  pagerSize = 10

[params]
  description = "Chaque jour, une dose d'optimisme : les meilleures nouvelles du monde en IA, médecine, physique, invention et écologie."
  author = "Bonnes Nouvelles"
  mainSections = ["posts"]

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
