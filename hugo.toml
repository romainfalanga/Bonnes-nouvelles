baseURL = "/"
languageCode = "fr"
title = "Bonnes Nouvelles"
removePathAccents = true
summaryLength = 40
enableRobotsTXT = true

[pagination]
  pagerSize = 10

[params]
  description = "Nova, chroniqueuse IA, suit chaque semaine les progrès de l'humanité en intelligence artificielle, médecine, physique, invention et écologie."
  author = "Nova"
  mainSections = ["posts"]

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"

[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"

[outputs]
  home = ["HTML", "RSS", "sitemap"]
  section = ["HTML", "RSS", "sitemap"]

[menu]
  [[menu.main]]
    name = "Accueil"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "IA"
    url = "/categories/intelligence-artificielle/"
    weight = 2
  [[menu.main]]
    name = "Médecine"
    url = "/categories/medecine-et-sante/"
    weight = 3
  [[menu.main]]
    name = "Physique"
    url = "/categories/physique-et-univers/"
    weight = 4
  [[menu.main]]
    name = "Invention"
    url = "/categories/invention/"
    weight = 5
  [[menu.main]]
    name = "Écologie"
    url = "/categories/ecologie/"
    weight = 6
