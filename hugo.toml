baseURL = "/"
languageCode = "fr"
title = "Bonnes Nouvelles"
theme = ""
paginate = 10
summaryLength = 40

[params]
  description = "Chaque jour, une dose d'optimisme : les meilleures nouvelles du monde en IA, technologie, écologie, innovation et idées inspirantes."
  author = "Bonnes Nouvelles"
  mainSections = ["posts"]

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"

[outputs]
  home = ["HTML", "RSS"]

